<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vagtplan — People's Doctor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy-900: #13102C;
      --navy-800: #26304F;
      --navy-700: #323E63;
      --navy-600: #38456D;
      --navy-500: #5669A4;
      --navy-400: #A3B0D9;
      --navy-300: #BFC9E3;
      --navy-200: #D8DEEE;
      --navy-100: #EDF0F7;
      --bg: #F8F8FD;
      --surface: #FFFFFF;
      --text: #13102C;
      --text-secondary: #5669A4;
      --green: #22C55E;
      --green-bg: #F0FDF4;
      --red: #EF4444;
      --red-bg: #FEF2F2;
      --gradient: linear-gradient(135deg, #38456D, #5669A4);
      --radius: 12px;
      --radius-full: 9999px;
      --shadow: 0 1px 3px rgba(19,16,44,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--navy-200);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 13px; font-weight: 600; color: var(--navy-500); letter-spacing: 0.5px; text-transform: uppercase; }
    .header h1 { font-size: 20px; font-weight: 700; }

    .container { max-width: 900px; margin: 0 auto; padding: 24px; }

    /* Calendar navigation */
    .cal-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .cal-nav h2 { font-size: 18px; font-weight: 600; }

    .cal-nav-btns { display: flex; gap: 8px; }

    .cal-nav-btns button {
      background: var(--surface);
      border: 1px solid var(--navy-200);
      border-radius: var(--radius-full);
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--navy-600);
      font-size: 16px;
    }

    .cal-nav-btns button:hover { background: var(--navy-100); }

    /* Week grid */
    .week-grid {
      display: grid;
      grid-template-columns: 80px repeat(5, 1fr);
      gap: 1px;
      background: var(--navy-200);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .week-header {
      background: var(--navy-600);
      color: white;
      padding: 12px 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
    }

    .week-header .date {
      font-size: 11px;
      font-weight: 400;
      opacity: 0.8;
      margin-top: 2px;
    }

    .time-label {
      background: var(--surface);
      padding: 16px 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--navy-600);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shift-cell {
      background: var(--surface);
      padding: 8px;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shift-cell.past {
      background: var(--navy-100);
      opacity: 0.5;
    }

    /* Shift states */
    .shift-empty {
      width: 100%;
      padding: 10px 8px;
      border: 2px dashed var(--navy-200);
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      color: var(--navy-400);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
      text-align: center;
    }

    .shift-empty:hover {
      border-color: var(--navy-500);
      color: var(--navy-600);
      background: rgba(56, 69, 109, 0.04);
    }

    .shift-filled {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      background: var(--green-bg);
      border: 1px solid #BBF7D0;
      text-align: center;
    }

    .shift-filled .name {
      font-size: 13px;
      font-weight: 600;
      color: #15803D;
    }

    .shift-filled .cancel {
      font-size: 11px;
      color: var(--red);
      cursor: pointer;
      margin-top: 4px;
      background: none;
      border: none;
      font-family: inherit;
    }

    .shift-filled .cancel:hover { text-decoration: underline; }

    /* Sign-up modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(19,16,44,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      width: 90%;
      max-width: 420px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(19,16,44,0.2);
    }

    .modal h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .modal .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--navy-700);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid var(--navy-100);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--navy-500);
    }

    .required { color: var(--red); }

    .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    .btn {
      padding: 10px 20px;
      border-radius: var(--radius-full);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--gradient);
      color: white;
      box-shadow: 0 2px 8px rgba(56,69,109,0.3);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--navy-800), var(--navy-600));
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      color: var(--navy-600);
      border: 2px solid var(--navy-200);
    }

    .btn-ghost:hover { background: var(--navy-100); }

    /* Legend */
    .legend {
      display: flex;
      gap: 20px;
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .legend-item { display: flex; align-items: center; gap: 6px; }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 4px;
    }

    @media (max-width: 640px) {
      .week-grid { grid-template-columns: 60px repeat(5, 1fr); }
      .shift-empty, .shift-filled .name { font-size: 11px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <span class="logo">People's Doctor</span>
      <h1>Vagtplan</h1>
    </div>
  </div>

  <div class="container">
    <div class="cal-nav">
      <h2 id="week-title"></h2>
      <div class="cal-nav-btns">
        <button onclick="prevWeek()">&#8249;</button>
        <button onclick="thisWeek()">I dag</button>
        <button onclick="nextWeek()">&#8250;</button>
      </div>
    </div>

    <div id="grid"></div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="border: 2px dashed var(--navy-200);"></div>
        <span>Ledig vagt</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--green-bg); border: 1px solid #BBF7D0;"></div>
        <span>Besat vagt</span>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="signup-modal">
    <div class="modal">
      <h3>Tag en vagt</h3>
      <p class="subtitle" id="modal-subtitle"></p>
      <div class="form-group">
        <label>Navn <span class="required">*</span></label>
        <input type="text" id="staff-name" placeholder="Dit fulde navn" autofocus>
      </div>
      <div class="form-group">
        <label>Email <span class="required">*</span></label>
        <input type="email" id="staff-email" placeholder="din@email.dk">
      </div>
      <div class="form-group">
        <label>Telefon</label>
        <input type="tel" id="staff-phone" placeholder="+45 ...">
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="closeModal()">Annuller</button>
        <button class="btn btn-primary" id="signup-btn" onclick="submitShift()">Tag vagten</button>
      </div>
    </div>
  </div>

  <script>
    const SLOTS = [
      { start: '08:00', end: '10:00', label: '08-10' },
      { start: '10:00', end: '12:00', label: '10-12' },
      { start: '12:00', end: '14:00', label: '12-14' },
      { start: '14:00', end: '16:00', label: '14-16' }
    ];

    const DAYS = ['Mandag', 'Tirsdag', 'Onsdag', 'Torsdag', 'Fredag'];

    let weekOffset = 0;
    let shifts = [];
    let pendingShift = null;

    function getWeekDates(offset) {
      const now = new Date();
      const monday = new Date(now);
      monday.setDate(now.getDate() - (now.getDay() || 7) + 1 + offset * 7);

      return Array.from({ length: 5 }, (_, i) => {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        return d.toISOString().split('T')[0];
      });
    }

    async function fetchShifts(dates) {
      const from = dates[0];
      const to = dates[dates.length - 1];
      const res = await fetch(`/api/shifts?from=${from}&to=${to}`);
      return res.json();
    }

    async function render() {
      const dates = getWeekDates(weekOffset);
      shifts = await fetchShifts(dates);
      const today = new Date().toISOString().split('T')[0];

      // Week title
      const months = ['jan', 'feb', 'mar', 'apr', 'maj', 'jun', 'jul', 'aug', 'sep', 'okt', 'nov', 'dec'];
      const d0 = new Date(dates[0] + 'T12:00:00');
      const d4 = new Date(dates[4] + 'T12:00:00');
      document.getElementById('week-title').textContent =
        `${d0.getDate()}. ${months[d0.getMonth()]} – ${d4.getDate()}. ${months[d4.getMonth()]} ${d4.getFullYear()}`;

      // Build grid
      let html = '<div class="week-grid">';

      // Header row
      html += '<div class="week-header"></div>';
      dates.forEach((date, i) => {
        const d = new Date(date + 'T12:00:00');
        html += `<div class="week-header">${DAYS[i]}<div class="date">${d.getDate()}/${d.getMonth() + 1}</div></div>`;
      });

      // Slot rows
      SLOTS.forEach(slot => {
        html += `<div class="time-label">${slot.label}</div>`;

        dates.forEach(date => {
          const isPast = date < today;
          const shift = shifts.find(s => s.date === date && s.start_time === slot.start);

          html += `<div class="shift-cell ${isPast ? 'past' : ''}">`;
          if (shift) {
            html += `<div class="shift-filled">
              <div class="name">${esc(shift.staff_name)}</div>
              ${!isPast ? `<button class="cancel" onclick="cancelShift('${shift.id}')">Afmeld</button>` : ''}
            </div>`;
          } else if (!isPast) {
            html += `<button class="shift-empty" onclick="openSignup('${date}', '${slot.start}', '${slot.end}')">+ Tag vagt</button>`;
          }
          html += '</div>';
        });
      });

      html += '</div>';
      document.getElementById('grid').innerHTML = html;
    }

    function openSignup(date, startTime, endTime) {
      pendingShift = { date, start_time: startTime, end_time: endTime };
      const d = new Date(date + 'T12:00:00');
      const days = ['søndag', 'mandag', 'tirsdag', 'onsdag', 'torsdag', 'fredag', 'lørdag'];
      document.getElementById('modal-subtitle').textContent =
        `${days[d.getDay()]} ${d.getDate()}/${d.getMonth() + 1} kl. ${startTime}-${endTime}`;
      document.getElementById('signup-modal').classList.add('open');
      requestAnimationFrame(() => document.getElementById('staff-name').focus());
    }

    function closeModal() {
      document.getElementById('signup-modal').classList.remove('open');
      pendingShift = null;
      document.getElementById('staff-name').value = '';
      document.getElementById('staff-email').value = '';
      document.getElementById('staff-phone').value = '';
    }

    async function submitShift() {
      const name = document.getElementById('staff-name').value.trim();
      const email = document.getElementById('staff-email').value.trim();

      if (!name) { document.getElementById('staff-name').style.borderColor = '#EF4444'; return; }
      if (!email) { document.getElementById('staff-email').style.borderColor = '#EF4444'; return; }

      const btn = document.getElementById('signup-btn');
      btn.textContent = 'Booker...';
      btn.disabled = true;

      try {
        await fetch('/api/shifts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            ...pendingShift,
            staff_name: name,
            staff_email: email,
            staff_phone: document.getElementById('staff-phone').value.trim()
          })
        });
        closeModal();
        await render();
      } catch (err) {
        alert(err.message);
      }

      btn.textContent = 'Tag vagten';
      btn.disabled = false;
    }

    async function cancelShift(id) {
      if (!confirm('Er du sikker på du vil afmelde denne vagt?')) return;
      await fetch(`/api/shifts/${id}/cancel`, { method: 'POST' });
      await render();
    }

    function prevWeek() { weekOffset--; render(); }
    function nextWeek() { weekOffset++; render(); }
    function thisWeek() { weekOffset = 0; render(); }

    function esc(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    // Listen for Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    render();
  </script>
</body>
</html>
